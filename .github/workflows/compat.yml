name: compatibility

# Version-compatibility matrix: for each supported ClickHouse OSS version, spin
# up a real server, apply schema.sql, and run `ch-analyzer --compat-check`
# (detect capabilities + run every collector, fail on any hard error). This is
# what guarantees "nothing breaks" across 23.x -> latest. ClickHouse Cloud
# (25.3+) can't run in CI and is covered by a live smoke test instead.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ch_version: ["23.3", "23.8", "24.3", "24.8", "25.3", "latest"]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:${{ matrix.ch_version }}
        # CH 24.x+ entrypoints lock the passwordless `default` user to
        # 127.0.0.1/::1 when no password is set. In CI the client reaches the
        # service over the Docker bridge (not localhost), so it 401s on 24.3+
        # while 23.x (no such lockdown) passed. Skipping user setup keeps the
        # image's built-in default user (empty password, network-open) across
        # all versions, matching the empty-password compat config below.
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1
        ports:
          - 18123:8123
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary (Go only)
        run: make build-go

      - name: Apply schema
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error
          sql = open("schema.sql").read()
          url = "http://localhost:18123/"
          def run(stmt):
              try:
                  urllib.request.urlopen(url, data=stmt.encode()); return None
              except urllib.error.HTTPError as e:
                  return f"{e.code} {e.read().decode('utf-8','replace')[:160]}"
              except Exception as e:
                  return str(e)[:160]
          def clean(stmt):
              lines = stmt.splitlines()
              while lines and (not lines[0].strip() or lines[0].strip().startswith('--')):
                  lines.pop(0)
              return "\n".join(lines).strip()
          if err := run("CREATE DATABASE IF NOT EXISTS ch_analyzer"):
              print(f"CREATE DATABASE warning: {err}")
          applied = errors = 0
          for raw in sql.split(';'):
              s = clean(raw)
              if not s: continue
              err = run(s)
              if err: errors += 1; print(f"schema stmt warning: {err}")
              else: applied += 1
          print(f"schema: {applied} applied, {errors} warnings")
          PY

      # Full per-feature e2e: capabilities + every collector + every read-only
      # /api endpoint (boots the real web server). Same script runs locally
      # (scripts/compat-test.sh) so local and CI produce an identical report.
      - name: Run feature-check
        env:
          CH_PORT: "18123"
          WEB_PORT: "18080"
        run: scripts/feature-check.sh "${{ matrix.ch_version }}"

      - name: Job summary
        if: always()
        run: |
          f="test/compat/reports/${{ matrix.ch_version }}.md"
          [ -f "$f" ] && cat "$f" >> "$GITHUB_STEP_SUMMARY" || echo "no report produced for ${{ matrix.ch_version }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-report-${{ matrix.ch_version }}
          path: test/compat/reports/${{ matrix.ch_version }}.md
          if-no-files-found: warn
