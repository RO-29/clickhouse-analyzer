# Prometheus scrape configuration for CH Analyzer
#
# ch-analyzer exposes /metrics on prometheus.listen_addr (set to ":9100" in
# ch-analyzer.yaml — see README below).
#
# When running via docker-compose the host is reachable as host.docker.internal
# (mapped via extra_hosts in docker-compose.yml). For a bare-metal run without
# Docker, change the target to localhost:9100.

global:
  scrape_interval:     60s   # match ch-analyzer poll interval — no point going faster
  evaluation_interval: 60s
  scrape_timeout:      15s

scrape_configs:
  - job_name: ch-analyzer
    honor_labels: true   # preserve instance/job labels from the metric itself
    static_configs:
      - targets:
          - host.docker.internal:9100   # ch-analyzer /metrics on the host
    # Discard anything that isn't a ch_analyzer_* metric
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'ch_analyzer_.+'
        action: keep
