# CH Analyzer — Suggestions Configuration
# Edit this file to customize remediation tips per alert category.
# Restart ch-analyzer after changes (no rebuild needed).
#
# Categories listed here OVERRIDE the built-in defaults for that category.
# Categories NOT listed here keep built-in defaults.
# To ADD to defaults, copy the built-in tips and add your own.

memory:
  - "Check max_memory_usage setting: SELECT name, value FROM system.settings WHERE name = 'max_memory_usage'"
  - "Find memory-heavy queries: SELECT query_id, memory_usage, query FROM system.processes ORDER BY memory_usage DESC LIMIT 5"
  - "Consider reducing max_bytes_before_external_group_by"

rss:
  - "RSS includes OS page cache — may not indicate a problem if available memory is sufficient"
  - "Check cache sizes: SELECT * FROM system.asynchronous_metrics WHERE metric LIKE '%Cache%'"
  - "Monitor CGroup limits: SELECT metric, value FROM system.asynchronous_metrics WHERE metric LIKE '%CGroup%'"

cpu:
  - "Find CPU-heavy queries: SELECT query_id, elapsed, read_rows, query FROM system.processes ORDER BY elapsed DESC LIMIT 5"
  - "Check parallel query count: SELECT count() FROM system.processes"
  - "Consider setting max_threads per query lower to reduce contention"
  - "Check load averages: SELECT metric, value FROM system.asynchronous_metrics WHERE metric LIKE 'LoadAverage%'"

parts:
  - "Check merge backlog: SELECT database, table, count() as parts FROM system.parts WHERE active GROUP BY database, table ORDER BY parts DESC LIMIT 10"
  - "Force merge: OPTIMIZE TABLE {table} FINAL"
  - "Check parts_to_delay_insert / parts_to_throw_insert thresholds"
  - "Consider increasing max_bytes_to_merge_at_max_space_in_pool"
  - "Check if too many partitions: SELECT database, table, count(DISTINCT partition_id) as partitions FROM system.parts WHERE active GROUP BY database, table ORDER BY partitions DESC LIMIT 10"

merges:
  - "Check current merges: SELECT database, table, elapsed, progress, num_parts FROM system.merges ORDER BY elapsed DESC"
  - "Too many concurrent merges saturate disk I/O — consider reducing background_pool_size"
  - "Check if large mutations are blocking regular merges"

mutations:
  - "Check stuck mutations: SELECT database, table, mutation_id, command, create_time, parts_to_do, latest_fail_reason FROM system.mutations WHERE NOT is_done"
  - "Kill stuck mutation: KILL MUTATION WHERE mutation_id = 'xxx'"
  - "Mutations rewrite entire parts — schedule during low-traffic periods"

disk:
  - "Check per-disk usage: SELECT name, formatReadableSize(free_space), formatReadableSize(total_space), round((total_space-free_space)*100/total_space,1) as used_pct FROM system.disks"
  - "Check table sizes: SELECT database, table, formatReadableSize(sum(bytes_on_disk)) as size FROM system.parts WHERE active GROUP BY database, table ORDER BY sum(bytes_on_disk) DESC LIMIT 10"
  - "Check TTL cleanup: SELECT database, table, engine_full FROM system.tables WHERE engine_full LIKE '%TTL%'"

s3_latency:
  - "Find slow S3 queries: SELECT query_id, ProfileEvents['S3ReadMicroseconds']/1000 as s3_ms, ProfileEvents['S3ReadRequestsCount'] as reqs, substring(query,1,200) FROM system.query_log WHERE type='QueryFinish' AND ProfileEvents['S3ReadRequestsCount'] > 0 ORDER BY s3_ms DESC LIMIT 10"
  - "Check S3 cache hit rate — if low, consider increasing s3 cache size"
  - "Queries hitting cold S3 data are always slower — keep hot data on local disk longer"
  - "Check S3 volume per table: SELECT database, table, formatReadableSize(sum(bytes_on_disk)) FROM system.parts WHERE active AND disk_name LIKE '%s3%' GROUP BY database, table ORDER BY sum(bytes_on_disk) DESC LIMIT 10"

query_storms:
  - "Find storm source: SELECT user, client_name, count() FROM system.processes GROUP BY user, client_name ORDER BY count() DESC"
  - "Consider setting max_concurrent_queries per user"
  - "Check if application is retrying failed queries in a tight loop"

failed_queries:
  - "Recent failures: SELECT exception_code, count() as cnt, any(exception), any(user) FROM system.query_log WHERE type='ExceptionWhileProcessing' AND event_time >= now() - INTERVAL 5 MINUTE GROUP BY exception_code ORDER BY cnt DESC"
  - "Common codes: 241=memory limit, 159=timeout, 60=table not found, 47=unknown column"

dictionaries:
  - "Check dictionary status: SELECT name, status, last_exception, source FROM system.dictionaries"
  - "Reload a dictionary: SYSTEM RELOAD DICTIONARY dict_name"

inserts:
  - "Batch inserts — many small inserts create too many parts and kill merge performance"
  - "Ideal batch size: 10,000-100,000 rows per INSERT"
  - "Check insert load: SELECT databases[1] as db, tables[1] as tbl, count(), avg(written_rows) FROM system.query_log WHERE type='QueryFinish' AND query_kind='Insert' AND event_time >= now() - INTERVAL 5 MINUTE GROUP BY db, tbl ORDER BY count() DESC"
  - "Consider async_insert=1 for high-frequency small inserts"

mvs:
  - "Check MV performance: SELECT view_name, avg(view_duration_ms), max(view_duration_ms), countIf(status != 'QueryFinish') as failures FROM system.query_views_log WHERE event_time >= now() - INTERVAL 1 HOUR GROUP BY view_name ORDER BY avg(view_duration_ms) DESC"
  - "Slow MVs block the INSERT pipeline — consider async materialized views"
  - "Chained MVs (MV reading from another MV target) can silently break"

query_optimization:
  - "Avoid SELECT * — always specify columns to reduce I/O and memory"
  - "Use PREWHERE instead of WHERE for conditions on large columns"
  - "Check primary key usage: SELECT query_id, read_rows, query FROM system.query_log WHERE type='QueryFinish' AND read_rows > 1000000 AND event_time >= now() - INTERVAL 1 HOUR ORDER BY read_rows DESC LIMIT 10"
  - "Add LIMIT to exploratory queries — unbounded SELECTs can OOM"
  - "For JOINs: put smaller table on RIGHT side — CH loads it into memory"
  - "Avoid FINAL on large ReplacingMergeTree tables — use argMax() pattern instead"

schema_design:
  - "Partition key: low cardinality (10-100 partitions) — too many kills merge performance"
  - "ORDER BY should match common query filters — most selective column first"
  - "Use LowCardinality(String) for <10K distinct values — saves 2-10x storage"
  - "Avoid Nullable unless necessary — adds UInt8 overhead and prevents optimizations"
  - "Choose narrowest types: UInt32 not UInt64, Date not DateTime when possible"

insert_optimization:
  - "Batch INSERTs: 10K-100K rows per batch is ideal"
  - "Each INSERT creates a new part — too many small parts overwhelm merges"
  - "Use async_insert=1 for high-frequency small inserts (CH batches server-side)"
  - "Use JSONEachRow or Native format for best insert performance"
  - "Tables with many MVs slow down inserts — use parallel_view_processing=1"

mergetree_tuning:
  - "max_bytes_to_merge_at_max_space_in_pool: increase for larger merges (default 150GB)"
  - "parts_to_delay_insert: INSERTs throttled when exceeded (default 150)"
  - "parts_to_throw_insert: INSERTs fail when exceeded (default 300)"
  - "min_age_to_force_merge_seconds: force merge old parts — useful for ReplacingMergeTree"
  - "Check settings: SELECT name, value FROM system.merge_tree_settings WHERE changed ORDER BY name"

memory_management:
  - "max_memory_usage: per-query limit — 50-75% of RAM for single-user"
  - "max_bytes_before_external_group_by: spill GROUP BY to disk (~50% of max_memory_usage)"
  - "max_bytes_before_external_sort: spill ORDER BY to disk"
  - "join_algorithm: use 'auto' or 'partial_merge' for large JOINs"
  - "Heavy queries: SELECT query_id, peak_memory_usage, query FROM system.query_log WHERE type='QueryFinish' AND event_time >= now() - INTERVAL 1 HOUR ORDER BY peak_memory_usage DESC LIMIT 10"

monitoring:
  - "Top queries: SELECT normalized_query_hash, count(), avg(query_duration_ms), avg(memory_usage), any(query) FROM system.query_log WHERE type='QueryFinish' AND event_time >= now() - INTERVAL 1 HOUR GROUP BY normalized_query_hash ORDER BY count()*avg(query_duration_ms) DESC LIMIT 20"
  - "Server load: SELECT metric, value FROM system.metrics WHERE metric IN ('Query','Merge','PartMutation','HTTPConnection')"
  - "Compression ratios: SELECT database, table, formatReadableSize(sum(data_compressed_bytes)) as compressed, round(sum(data_uncompressed_bytes)/sum(data_compressed_bytes),2) as ratio FROM system.columns GROUP BY database, table ORDER BY sum(data_compressed_bytes) DESC LIMIT 20"

disk_balance:
  - "JBOD should be evenly distributed — imbalance means some disks fill faster"
  - "Per-disk data: SELECT disk_name, formatReadableSize(sum(bytes_on_disk)) as size, count() as parts FROM system.parts WHERE active GROUP BY disk_name ORDER BY disk_name"
  - "JBOD uses round-robin for new parts — existing imbalance is from historical placement"
